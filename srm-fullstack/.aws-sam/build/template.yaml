AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "srm-fullstack \u2014 Tree & Cycle REST API"
Globals:
  Function:
    Runtime: nodejs18.x
    MemorySize: 256
    Timeout: 10
Resources:
  BfhlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handler.handler
      CodeUri: BfhlFunction
      Events:
        BfhlPost:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: BfhlApi
            Path: /bfhl
            Method: POST
    Metadata:
      SamResourceId: BfhlFunction
  BfhlApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowHeaders:
        - Content-Type
        AllowMethods:
        - POST
Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint URL
    Value:
      Fn::Sub: https://${BfhlApi}.execute-api.${AWS::Region}.amazonaws.com
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value:
      Fn::GetAtt:
      - BfhlFunction
      - Arn
