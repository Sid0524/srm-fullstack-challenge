<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL Tree Processor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <span class="badge-api">POST /bfhl</span>
  <h1>Tree &amp; Cycle Processor</h1>
  <span class="subtitle">SRM Fullstack Challenge</span>
</header>

<main>
  <!-- INPUT PANEL -->
  <div class="input-panel">
    <h2>Input</h2>

    <form id="apiForm">
      <div>
        <label for="edgeInput">Edge List</label>
        <textarea
          id="edgeInput"
          placeholder="A->B, A->C, B->D&#10;X->Y, Y->Z, Z->X&#10;G->H, G->H, G->I&#10;hello, 1->2"
          spellcheck="false"
        ></textarea>
        <p class="input-hint" style="margin-top:6px">
          Comma or newline separated. E.g. <code>A-&gt;B, A-&gt;C, B-&gt;D</code>
        </p>
      </div>

      <div>
        <label for="baseUrl">API Base URL</label>
        <input
          type="text"
          id="baseUrl"
          value="http://localhost:3000"
          spellcheck="false"
        />
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <div class="spinner"></div>
        <span class="btn-text">▶ Process Edges</span>
      </button>
    </form>

    <div class="input-hint">
      <strong>Valid format:</strong> <code>X-&gt;Y</code> where X and Y are single uppercase letters A–Z.<br />
      <strong>Invalid examples:</strong> <code>A-&gt;A</code> (self-loop), <code>AB-&gt;C</code>, <code>hello</code>, <code>1-&gt;2</code>
    </div>
  </div>

  <!-- RESULTS PANEL -->
  <div class="results-panel" id="resultsPanel">
    <div class="placeholder-msg">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" />
      </svg>
      <div>
        <strong>No results yet</strong><br />
        <span style="font-size:12px">Enter edges and click Process Edges</span>
      </div>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
