AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: srm-fullstack — Tree & Cycle REST API

Globals:
  Function:
    Runtime: nodejs18.x
    MemorySize: 256
    Timeout: 10

Resources:
  BfhlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handler.handler
      CodeUri: backend/
      Events:
        BfhlPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BfhlApi
            Path: /bfhl
            Method: POST

  BfhlApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - POST

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${BfhlApi}.execute-api.${AWS::Region}.amazonaws.com"

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt BfhlFunction.Arn
